name: eth_url_parser
description: A Dart library for parsing and building Ethereum URLs according to
  ERC-681 and ERC-831. Supports ERC-20 transfers, ENS names, and chain IDs.
version: 0.1.0
repository: https://github.com/fuseio/eth_url_parser
homepage: https://fuse.io
topics:
  - ethereum
  - blockchain
  - erc-681
  - erc-831
  - url-parser

environment:
  sdk: ">=3.4.0 <4.0.0"

dev_dependencies:
  lints: ^5.1.1
  test: ^1.25.15
